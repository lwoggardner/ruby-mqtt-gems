name: Build
on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      broker_profile:
        description: 'Mosquitto broker profile'
        required: false
        default: 'testing'
        type: choice
        options:
          - stable
          - testing

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ruby: ['3.4']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    
    - name: Start mosquitto broker
      run: docker compose --profile ${{ github.event.inputs.broker_profile || 'stable' }} up -d
    
    - name: Wait for broker
      run: sleep 3
    
    - name: Run build (rubocop, docs, tests)
      run: bundle exec rake
    
    - name: Stop mosquitto broker
      if: always()
      run: docker compose --profile ${{ github.event.inputs.broker_profile || 'stable' }} down
