name: Build
on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      broker_profile:
        description: 'Mosquitto broker profile'
        required: false
        default: 'testing'
        type: choice
        options:
          - stable
          - testing

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ruby: ['3.4']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    
    - name: Clean stale gems from cache
      run: bundle clean
    
    - name: Run build (rubocop, docs, tests with broker)
      run: bundle exec rake
    
    - name: Show broker logs on failure
      if: failure()
      run: docker compose logs
