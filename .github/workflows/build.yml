name: Build
on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      broker_profile:
        description: 'Mosquitto broker profile'
        required: false
        default: 'testing'
        type: choice
        options:
          - stable
          - testing

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ruby: ['3.4']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    
    - name: Clean stale gems from cache
      run: bundle clean
    
    - name: Generate mosquitto password file
      run: |
        export MOSQUITTO_UID=$(id -u)
        export MOSQUITTO_GID=$(id -g)
        docker run --rm --user $MOSQUITTO_UID:$MOSQUITTO_GID -v $PWD/spec/fixture/mosquitto:/mosquitto/config eclipse-mosquitto:latest mosquitto_passwd -b -c /mosquitto/config/passwd ro readonly
        ls -la spec/fixture/mosquitto/passwd
      env:
        MOSQUITTO_UID: ${{ env.MOSQUITTO_UID }}
        MOSQUITTO_GID: ${{ env.MOSQUITTO_GID }}
    
    - name: Run build (rubocop, docs, tests with broker)
      run: bundle exec rake
      env:
        MOSQUITTO_UID: $(id -u)
        MOSQUITTO_GID: $(id -g)
    
    - name: Show broker logs on failure
      if: failure()
      run: docker compose logs
