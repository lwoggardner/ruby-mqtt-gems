name: Release Gems

on:
  workflow_dispatch:  # Manual trigger for existing tags
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # Matches v1.2.3 and v1.2.3.anything

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
    - uses: actions/checkout@v5
    
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
    
    - name: Configure RubyGems credentials
      run: |
        mkdir -p ~/.gem
        cat > ~/.gem/credentials << EOF
        ---
        :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
        EOF
        chmod 0600 ~/.gem/credentials
    
    - name: Build and release gems in dependency order
      run: |
        # Release concurrent_monitor first (no dependencies)
        cd gems/concurrent_monitor
        gem build concurrent_monitor.gemspec
        gem push *.gem
        cd ../..
        
        # Release mqtt-core (depends on concurrent_monitor)
        cd gems/mqtt-core
        gem build mqtt-core.gemspec
        gem push *.gem
        cd ../..
        
        # Release mqtt-v3 and mqtt-v5 (both depend on mqtt-core)
        cd gems/mqtt-v3
        gem build mqtt-v3.gemspec
        gem push *.gem
        cd ../..
        
        cd gems/mqtt-v5
        gem build mqtt-v5.gemspec
        gem push *.gem